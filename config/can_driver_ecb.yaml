# =============================================================================
# can_driver_node ECB 单机联调配置
# =============================================================================
# 用途：
# - 当现场只接入 ECB 网络电机，且本机没有 can0/can1 等 SocketCAN 设备时使用；
# - 避免默认综合配置中的 MT/PP joints 因 can0 不存在而导致节点启动失败。
# =============================================================================

can_driver_node:
  control_frequency: 100.0
  debug_bypass_ros_control: true
  motor_query_hz: 100.0
  pp_fast_write_enabled: true
  startup_position_sync_timeout_sec: 1.0
  safety_stop_on_fault: true
  safety_require_enabled_for_motion: true
  max_position_step_rad: 0.0
  safety_hold_after_device_recover: true

  joints:
    # ECB_AUTO_PROBE_BEGIN
    - name: ecb_joint_02
      # 由 scripts/discover_ecb_and_enable_yaml.sh 自动回填（固定 IP）
      motor_id: 0x02
      protocol: ECB
      can_device: ecb://192.168.1.30
      ecb_ip: 192.168.1.30
      ecb_discovery: fixed
      ecb_refresh_ms: 20
      control_mode: position
      position_scale: 6.283185307179586e-4
      velocity_scale: 1.0471975511965978e-2
    - name: ecb_joint_03
      # 由 scripts/discover_ecb_and_enable_yaml.sh 自动回填（固定 IP）
      motor_id: 0x03
      protocol: ECB
      can_device: ecb://192.168.1.30
      ecb_ip: 192.168.1.30
      ecb_discovery: fixed
      ecb_refresh_ms: 20
      control_mode: position
      position_scale: 6.283185307179586e-4
      velocity_scale: 1.0471975511965978e-2
    - name: ecb_joint_04
      # 由 scripts/discover_ecb_and_enable_yaml.sh 自动回填（固定 IP）
      motor_id: 0x04
      protocol: ECB
      can_device: ecb://192.168.1.30
      ecb_ip: 192.168.1.30
      ecb_discovery: fixed
      ecb_refresh_ms: 20
      control_mode: position
      position_scale: 6.283185307179586e-4
      velocity_scale: 1.0471975511965978e-2
    - name: ecb_joint_05
      # 由 scripts/discover_ecb_and_enable_yaml.sh 自动回填（固定 IP）
      motor_id: 0x05
      protocol: ECB
      can_device: ecb://192.168.1.30
      ecb_ip: 192.168.1.30
      ecb_discovery: fixed
      ecb_refresh_ms: 20
      control_mode: position
      position_scale: 6.283185307179586e-4
      velocity_scale: 1.0471975511965978e-2
    # ECB_AUTO_PROBE_END
