# =============================================================================
# can_driver_node 硬件参数配置
# =============================================================================
# 本文件由 ROS 参数服务器加载（见 launch/can_driver.launch），
# 所有参数挂载在 /can_driver_node/ 命名空间下，
# 节点通过 pnh.getParam("joints", ...) 读取。
# =============================================================================

can_driver_node:

  # 控制循环频率（Hz）
  # CanDriverHW::read() → controller_manager::update() → CanDriverHW::write()
  # 每秒执行的次数。100 Hz = 10 ms 一个周期，适合大多数工业电机。
  # 若 CAN 总线负载过高可适当降低（如 50 Hz）。
  control_frequency: 100.0

  # 调试模式：true 时 direct topic 命令绕过 ros_control 回退逻辑。
  # 行为：收到一次 direct 命令后将保持生效，直到下一次 direct 命令或 STOP/DISABLE。
  # 注意：该模式仅用于单电机联调，默认关闭。
  debug_bypass_ros_control: true

  # 电机状态查询频率（协议层轮询频率，单位 Hz）。
  # >0：固定频率；<=0：使用协议默认自适应策略。
  motor_query_hz: 100.0

  # PP 协议快写模式开关（CMD=0x05）。
  # false: 使用普通写命令（CMD=0x01，带写返回）
  # true : 位置/速度命令使用快写命令（CMD=0x05，无返回、立即生效）
  pp_fast_write_enabled: true

  # 上电启动位置同步窗口（秒）。
  # 启动时会读取电机当前位置并对齐 position 命令，
  # 同时校验是否落在 URDF/rosparam 限位范围内；超限将拒绝激活驱动。
  startup_position_sync_timeout_sec: 1.0

  # 安全策略：检测到故障位时自动发送一次 Stop，并阻断后续运动命令。
  # 注意：该策略不会自动 Disable，便于故障排查时保持驱动在线。
  safety_stop_on_fault: true

  # 安全策略：发送运动命令前要求电机处于 enabled 状态。
  # true  : 未使能时直接阻断运动命令（推荐）
  # false : 不检查 enabled，保持旧行为
  safety_require_enabled_for_motion: true

  # 防误动策略：位置模式单周期最大步进（rad）。
  # <=0 表示关闭该限制；>0 时超出步进会被截断并告警。
  max_position_step_rad: 0.0

  # 安全策略：CAN 设备从掉线恢复后是否保持一个控制周期并清空直通命令。
  # true  : 恢复首周期不下发运动命令，避免链路恢复瞬间误动作
  # false : 恢复后立即按当前命令继续下发
  safety_hold_after_device_recover: true

  # --------------------------------------------------------------------------
  # joints：关节列表
  # --------------------------------------------------------------------------
  # 每个条目描述一个"逻辑关节"到"物理电机"的映射关系。
  # ros_control 通过 joint name 与 URDF、MoveIt moveit_config 三处��齐，
  # 因此 name 字段必须与 URDF 中的 <joint name="..."> 完全一致。
  # --------------------------------------------------------------------------
  joints:

    # --- 底盘差速驱动轮 ---
    # 由 diff_drive_controller/DiffDriveController 控制（见 ros_controllers.yaml）
    # 使用 MT 协议（迈信 EP 系列），CAN ID 范围 0x141~0x1FF

    - name: left_wheel          # 关节名，须与 URDF 一致
      motor_id: 0x141           # 电机 CAN Node ID（十六进制），MT 协议范围 0x01~0xFF
      protocol: MT              # 协议类型：MT = 迈信协议；PP = EyouCan(PP)
      can_device: can0         # 设备名示例：can0/can1
      control_mode: velocity    # 控制模式：velocity = 速度环；position = 位置环
      # MT 协议速度命令单位为 0.01dps/LSB，位置命令单位为 0.01°/LSB。
      # 统一按 SI 命令（rad / rad/s）换算：raw = cmd / scale。
      velocity_scale: 1.7453292519943296e-04  # = 0.01 * pi / 180 (rad/s per LSB)
      position_scale: 1.7453292519943296e-04  # = 0.01 * pi / 180 (rad per LSB)

    - name: right_wheel
      motor_id: 0x14B
      protocol: MT
      can_device: can0
      control_mode: velocity
      velocity_scale: 1.7453292519943296e-04
      position_scale: 1.7453292519943296e-04

    # --- 机械臂关节 ---
    # 由 position_controllers/JointTrajectoryController 控制（见 ros_controllers.yaml）
    # 使用 PP 协议（EyouCan），CAN ID 范围 0x00~0xFF（即 motor_id 本身）
    # 注意：MT 和 PP 的响应帧 ID 范围不重叠，can0/can1 可各自混用两种协议

    - name: rotary_table        # 转台（第 1 轴）
      motor_id: 0x16
      protocol: PP
      can_device: can0         # 虚拟 CAN 接口（测试用），实物联调时改回 can1
      control_mode: position
      # 每个原始计数（raw）对应的弧度：2*pi / 65536
      # raw * position_scale = rad
      position_scale: 9.587379924285257e-05
      # 速度原始单位为 脉冲/秒，转换到 rad/s 同样使用 2*pi/65536
      velocity_scale: 9.587379924285257e-05

    - name: larger_arm          # 大臂（第 2 轴）
      motor_id: 0x05
      protocol: PP
      can_device: can0        # 虚拟 CAN 接口（测试用），实物联调时改回 can1
      control_mode: position

    - name: smaller_arm         # 小臂（第 3 轴）
      motor_id: 0x13
      protocol: PP
      can_device: can0         # 虚拟 CAN 接口（测试用），实物联调时改回 can1
      control_mode: position

    - name: wrist_x             # 腕部 X 轴（第 4 轴）
      motor_id: 0x14
      protocol: PP
      can_device: can0         # 虚拟 CAN 接口（测试用），实物联调时改回 can1
      control_mode: position

    - name: wrist_y             # 腕部 Y 轴（第 5 轴）
      motor_id: 0x15
      protocol: PP
      can_device: can0         # 虚拟 CAN 接口（测试用），实物联调时改回 can1
      control_mode: position

    - name: wrist_z             # 腕部 Z 轴（第 6 轴）
      motor_id: 0x10
      protocol: PP
      can_device: can0         # 虚拟 CAN 接口（测试用），实物联调时改回 can1
      control_mode: position

    - name: actuator            # 末端执行器（夹爪/工具）
      motor_id: 0x17
      protocol: PP
      can_device: can0         # 虚拟 CAN 接口（测试用），实物联调时改回 can1
      control_mode: position

    # --------------------------------------------------------------------------
    # 可选字段（未填写时默认 1.0）：
    #   position_scale: 1.0   # 协议原始位置值 → rad 的换算系数（raw * scale = rad）
    #   velocity_scale: 1.0   # 协议原始速度值 → rad/s 的换算系数
    # 示例：若电机上报单位为 0.01°，换算到 rad：
    #   position_scale: 0.0001745329   # = 0.01 * π/180
    # --------------------------------------------------------------------------

    # --- ECB(1MINTASCA) 网络电机示例 ---
    # 说明：ECB 协议层使用固定点原始单位：
    #   位置: 1 raw = 1e-4 rev
    #   速度: 1 raw = 0.1 rpm
    # 若希望上层使用 SI 单位，建议设置：
    #   position_scale: 6.283185307179586e-4   # rad / raw = (2*pi)/10000
    #   velocity_scale: 1.0471975511965978e-2  # rad/s / raw = (2*pi/60)/10
    # 固定 IP + ID（推荐生产环境）：
    # - name: ecb_joint_fixed
    #   motor_id: 0x01
    #   protocol: ECB
    #   can_device: ecb://192.168.1.20
    #   ecb_ip: 192.168.1.20
    #   ecb_discovery: fixed
    #   ecb_refresh_ms: 20
    #   control_mode: position
    #   position_scale: 6.283185307179586e-4
    #   velocity_scale: 1.0471975511965978e-2
    #
    # 自动扫描（适合调试/首次部署）：
    # ECB_AUTO_PROBE_BEGIN
    - name: ecb_joint_02
      # 由 scripts/discover_ecb_and_enable_yaml.sh 自动回填（固定 IP）
      motor_id: 0x02
      protocol: ECB
      can_device: ecb://192.168.1.30
      ecb_ip: 192.168.1.30
      ecb_discovery: fixed
      ecb_refresh_ms: 20
      control_mode: position
      position_scale: 6.283185307179586e-4
      velocity_scale: 1.0471975511965978e-2
    - name: ecb_joint_03
      # 由 scripts/discover_ecb_and_enable_yaml.sh 自动回填（固定 IP）
      motor_id: 0x03
      protocol: ECB
      can_device: ecb://192.168.1.30
      ecb_ip: 192.168.1.30
      ecb_discovery: fixed
      ecb_refresh_ms: 20
      control_mode: position
      position_scale: 6.283185307179586e-4
      velocity_scale: 1.0471975511965978e-2
    - name: ecb_joint_04
      # 由 scripts/discover_ecb_and_enable_yaml.sh 自动回填（固定 IP）
      motor_id: 0x04
      protocol: ECB
      can_device: ecb://192.168.1.30
      ecb_ip: 192.168.1.30
      ecb_discovery: fixed
      ecb_refresh_ms: 20
      control_mode: position
      position_scale: 6.283185307179586e-4
      velocity_scale: 1.0471975511965978e-2
    - name: ecb_joint_05
      # 由 scripts/discover_ecb_and_enable_yaml.sh 自动回填（固定 IP）
      motor_id: 0x05
      protocol: ECB
      can_device: ecb://192.168.1.30
      ecb_ip: 192.168.1.30
      ecb_discovery: fixed
      ecb_refresh_ms: 20
      control_mode: position
      position_scale: 6.283185307179586e-4
      velocity_scale: 1.0471975511965978e-2
    # ECB_AUTO_PROBE_END
