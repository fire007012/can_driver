# =============================================================================
# ros_control 控制器配置
# =============================================================================
# 本文件由 ROS 参数服务器加载（见 launch/can_driver.launch）。
# controller_manager 读取这些参数后，按需实例化各控制器插件。
#
# 数据流向：
#   MoveIt / Nav Stack
#       ↓ follow_joint_trajectory / /cmd_vel
#   controller_manager
#       ↓ PositionJointInterface / VelocityJointInterface
#   CanDriverHW::write()
#       ↓ CAN 帧
#   物理电机
# =============================================================================

# controller_manager 全局设置
controller_manager:
  # 控制器管理器的更新频率（Hz），建议与 can_driver.yaml 中的
  # control_frequency 保持一致，避免步调不同步。
  update_rate: 100


# =============================================================================
# joint_state_controller
# =============================================================================
# 作用：将 CanDriverHW::read() 写入的关节状态（位置/速度/力矩）
#       打包成 sensor_msgs/JointState 消息，发布到 /joint_states topic。
# MoveIt、RViz、robot_state_publisher 都依赖这个 topic 来显示机器人状态。
# 这个控制器只读不写，不会向电机发送任何指令。
joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 50    # /joint_states 发布频率（Hz），50 Hz 对 RViz 可视化已足够


# =============================================================================
# arm_controller
# =============================================================================
# 作用：接收 MoveIt 发来的 follow_joint_trajectory Action 目标，
#       按时间插值后逐帧写入 PositionJointInterface，
#       CanDriverHW::write() 再将位置指令转发给 PP 协议电机。
#
# 使用场景：MoveIt 运动规划执行、rqt_joint_trajectory_controller 手动调试。
arm_controller:
  type: position_controllers/JointTrajectoryController

  # 受控关节列表，名称须与 can_driver.yaml 中的 name 字段及 URDF 完全一致。
  joints:
    - elbow_pitch_joint        # 小臂俯仰（第 3 轴）
    # - wrist_pitch_joint        # 腕部俯仰（第 4 轴）
    # - wrist_roll_joint         # 腕部滚转（第 5 轴）
    # - wrist_yaw_joint          # 腕部偏航（第 6 轴）
    # - left_gripper_finger_joint  # 左夹爪（第 7 轴）

  # 轨迹执行约束（可选，未填则使用插件默认值）
  # constraints:
  #   goal_time: 0.5          # 允许超出目标时间的秒数
  #   stopped_velocity_tolerance: 0.01  # 到达目标时速度容差（rad/s）


# =============================================================================
# wheel_controller
# =============================================================================
# 作用：接收 Navigation Stack 发来的 geometry_msgs/Twist（/cmd_vel），
#       根据差速运动学模型拆解为左右轮速度，写入 VelocityJointInterface，
#       CanDriverHW::write() 再将速度指令转发给 velocity 语义电机。
#       同时将编码器反馈积分为里程计，发布 /odom topic 和 odom→base_link TF。
#
# 使用场景：ROS Navigation Stack（move_base）、手柄遥控底盘。
wheel_controller:
  type: diff_drive_controller/DiffDriveController

  left_wheel:  left_front_wheel_joint
  right_wheel: right_front_wheel_joint

  publish_rate: 50.0
  cmd_vel_timeout: 0.3
  base_frame_id: base_link
  odom_frame_id: odom
  enable_odom_tf: true

  # 实车履带等效参数，沿用旧底盘正式常量。
  wheel_separation: 0.36
  wheel_radius: 0.075

  linear:
    x:
      has_velocity_limits: true
      max_velocity: 0.8
      has_acceleration_limits: true
      max_acceleration: 1.0
  angular:
    z:
      has_velocity_limits: true
      max_velocity: 1.5
      has_acceleration_limits: true
      max_acceleration: 2.0
